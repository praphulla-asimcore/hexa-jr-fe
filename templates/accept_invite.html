<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Accept Invitation — Hexa Finance</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"/>
<link rel="stylesheet" href="/css/main.css"/>
<link rel="stylesheet" href="/css/login.css"/>
</head>
<body class="login-body">
<div class="login-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-brand">
      <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
        <polygon points="16,2 30,10 30,22 16,30 2,22 2,10" fill="#6366f1" opacity="0.9"/>
        <circle cx="16" cy="16" r="4" fill="white"/>
      </svg>
      <div>
        <div class="login-brand-name">HEXA Finance</div>
        <div class="login-brand-sub">hexamatics.finance</div>
      </div>
    </div>

    <h1 class="login-title">Accept Invitation</h1>
    <p class="login-subtitle">Set your name and password to activate your account</p>

    <form method="POST" action="/accept-invite" class="login-form">
      <input type="hidden" name="token" value="{{ token }}"/>

      {% if error %}
      <div class="error-msg" style="margin-bottom:16px">{{ error }}</div>
      {% endif %}

      <div class="login-field">
        <label class="label" for="name">Full name</label>
        <input id="name" type="text" name="name" class="input" placeholder="Your full name" required autofocus/>
      </div>
      <div class="login-field">
        <label class="label" for="password">Password</label>
        <input id="password" type="password" name="password" class="input" placeholder="Min 8 characters" required/>
      </div>
      <div class="login-field">
        <label class="label" for="password2">Confirm password</label>
        <input id="password2" type="password" name="password2" class="input" placeholder="Repeat password" required/>
      </div>

      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:8px">
        Activate Account
      </button>
    </form>
    <p class="login-footer">Secure finance operations · Hexamatics Sdn Bhd</p>
  </div>
</div>
</body>
</html>
