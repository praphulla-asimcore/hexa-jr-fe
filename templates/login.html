<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hexa Finance — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"/>
<link rel="stylesheet" href="/css/main.css"/>
<link rel="stylesheet" href="/css/login.css"/>
</head>
<body class="login-body">

<div class="login-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-brand">
      <svg width="40" height="40" viewBox="0 0 32 32" fill="none">
        <polygon points="16,2 30,10 30,22 16,30 2,22 2,10" fill="#6366f1" opacity="0.9"/>
        <polygon points="16,8 24,13 24,21 16,26 8,21 8,13" fill="white" opacity="0.15"/>
        <circle cx="16" cy="16" r="4" fill="white"/>
      </svg>
      <div>
        <div class="login-brand-name">HEXA Finance</div>
        <div class="login-brand-sub">hexamatics.finance</div>
      </div>
    </div>

    <h1 class="login-title">Sign in</h1>
    <p class="login-subtitle">Access the Hexa Finance operations portal</p>

    <form method="POST" action="/login" class="login-form">
      {% if error %}
      <div class="error-msg" style="margin-bottom:16px">{{ error }}</div>
      {% endif %}

      <div class="login-field">
        <label class="label" for="email">Email address</label>
        <input id="email" type="email" name="email" class="input" placeholder="you@hexamatics.com" required autofocus autocomplete="email"/>
      </div>

      <div class="login-field">
        <label class="label" for="password">Password</label>
        <input id="password" type="password" name="password" class="input" placeholder="••••••••" required autocomplete="current-password"/>
      </div>

      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:8px">
        Sign in
      </button>
    </form>

    <p class="login-footer">Secure finance operations · Hexamatics Sdn Bhd</p>
  </div>
</div>
</body>
</html>
